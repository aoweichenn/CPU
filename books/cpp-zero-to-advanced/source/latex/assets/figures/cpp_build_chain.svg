<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2A6F97"/>
    </marker>
    <style>
      text { font-family: "Noto Sans CJK SC", "Noto Sans", sans-serif; fill: #14213D; }
      .title { font-size: 30px; font-weight: 700; }
      .stage { font-size: 22px; font-weight: 700; }
      .file { font-size: 19px; fill: #174E70; }
      .small { font-size: 17px; fill: #5B5F66; }
      .box1 { fill: #EEF6FA; stroke: #2A6F97; stroke-width: 2; rx: 14; }
      .box2 { fill: #EEF8F3; stroke: #2A7F62; stroke-width: 2; rx: 14; }
      .box3 { fill: #FFF7E6; stroke: #9A6A00; stroke-width: 2; rx: 14; }
      .box4 { fill: #F5F1FB; stroke: #7251A5; stroke-width: 2; rx: 14; }
      .warn { fill: #FFF1F1; stroke: #A33B3B; stroke-width: 2; rx: 12; }
      .arrow { stroke: #2A6F97; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="0" y="0" width="1000" height="520" fill="#ffffff"/>
  <text x="50" y="55" class="title">从 main.cpp 到可执行文件</text>
  <text x="50" y="88" class="small">每个产物只能证明一部分事实，不能把“能链接”误当成“运行一定正确”。</text>

  <rect x="55" y="140" width="150" height="94" class="box1"/>
  <text x="130" y="174" text-anchor="middle" class="stage">源码</text>
  <text x="130" y="204" text-anchor="middle" class="file">main.cpp</text>

  <rect x="245" y="140" width="150" height="94" class="box2"/>
  <text x="320" y="174" text-anchor="middle" class="stage">预处理</text>
  <text x="320" y="204" text-anchor="middle" class="file">main.i</text>

  <rect x="435" y="140" width="150" height="94" class="box3"/>
  <text x="510" y="174" text-anchor="middle" class="stage">编译</text>
  <text x="510" y="204" text-anchor="middle" class="file">main.s</text>

  <rect x="625" y="140" width="150" height="94" class="box4"/>
  <text x="700" y="174" text-anchor="middle" class="stage">汇编</text>
  <text x="700" y="204" text-anchor="middle" class="file">main.o</text>

  <rect x="815" y="140" width="150" height="94" class="box1"/>
  <text x="890" y="174" text-anchor="middle" class="stage">链接</text>
  <text x="890" y="204" text-anchor="middle" class="file">app</text>

  <path d="M 205 187 L 242 187" class="arrow"/>
  <path d="M 395 187 L 432 187" class="arrow"/>
  <path d="M 585 187 L 622 187" class="arrow"/>
  <path d="M 775 187 L 812 187" class="arrow"/>

  <rect x="63" y="305" width="182" height="76" class="warn"/>
  <text x="154" y="335" text-anchor="middle" class="small">头文件路径、宏</text>
  <text x="154" y="361" text-anchor="middle" class="small">会影响 main.i</text>

  <rect x="289" y="305" width="182" height="76" class="warn"/>
  <text x="380" y="335" text-anchor="middle" class="small">类型错误、语法错误</text>
  <text x="380" y="361" text-anchor="middle" class="small">通常在前端暴露</text>

  <rect x="515" y="305" width="182" height="76" class="warn"/>
  <text x="606" y="335" text-anchor="middle" class="small">只有声明没有实现</text>
  <text x="606" y="361" text-anchor="middle" class="small">可能到链接才失败</text>

  <rect x="741" y="305" width="182" height="76" class="warn"/>
  <text x="832" y="335" text-anchor="middle" class="small">能生成 app</text>
  <text x="832" y="361" text-anchor="middle" class="small">不证明输入和边界正确</text>

  <text x="72" y="452" class="small">读构建日志时先问：当前文件在哪一层？工具读入了什么？产物能证明什么，不能证明什么？</text>
</svg>
