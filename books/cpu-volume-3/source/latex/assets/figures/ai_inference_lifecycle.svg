<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2A6F97"/>
    </marker>
    <style>
      text { font-family: "Noto Sans CJK SC", "Noto Sans", sans-serif; fill: #14213D; }
      .title { font-size: 30px; font-weight: 700; }
      .lane { font-size: 22px; font-weight: 700; fill: #2A6F97; }
      .label { font-size: 20px; font-weight: 700; }
      .small { font-size: 17px; fill: #5B5F66; }
      .box1 { fill: #EEF6FA; stroke: #2A6F97; stroke-width: 2; rx: 14; }
      .box2 { fill: #EEF8F3; stroke: #2A7F62; stroke-width: 2; rx: 14; }
      .box3 { fill: #F5F1FB; stroke: #7251A5; stroke-width: 2; rx: 14; }
      .box4 { fill: #FFF7E6; stroke: #9A6A00; stroke-width: 2; rx: 14; }
      .state { fill: #FFF1F1; stroke: #A33B3B; stroke-width: 2; rx: 14; }
      .arrow { stroke: #2A6F97; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #5B5F66; stroke-width: 2.4; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="0" y="0" width="1000" height="560" fill="#ffffff"/>
  <text x="50" y="55" class="title">模型编译链与请求执行链</text>
  <text x="50" y="88" class="small">静态模型事实提前变成计划；每次请求只绑定会增长的运行时状态。</text>

  <text x="55" y="160" class="lane">模型到计划</text>
  <rect x="190" y="120" width="160" height="86" class="box1"/>
  <text x="270" y="154" text-anchor="middle" class="label">模型目录</text>
  <text x="270" y="181" text-anchor="middle" class="small">config / tensor</text>

  <rect x="400" y="120" width="160" height="86" class="box2"/>
  <text x="480" y="154" text-anchor="middle" class="label">manifest</text>
  <text x="480" y="181" text-anchor="middle" class="small">命名和校验合同</text>

  <rect x="610" y="120" width="160" height="86" class="box3"/>
  <text x="690" y="154" text-anchor="middle" class="label">typed graph</text>
  <text x="690" y="181" text-anchor="middle" class="small">shape / dtype / state</text>

  <rect x="795" y="230" width="150" height="96" class="box4"/>
  <text x="870" y="265" text-anchor="middle" class="label">计划</text>
  <text x="870" y="292" text-anchor="middle" class="small">kernel / layout</text>

  <text x="55" y="372" class="lane">请求到 token</text>
  <rect x="190" y="335" width="160" height="86" class="box1"/>
  <text x="270" y="369" text-anchor="middle" class="label">prompt</text>
  <text x="270" y="396" text-anchor="middle" class="small">token buffer</text>

  <rect x="400" y="335" width="160" height="86" class="box2"/>
  <text x="480" y="369" text-anchor="middle" class="label">prefill</text>
  <text x="480" y="396" text-anchor="middle" class="small">写入历史 K/V</text>

  <rect x="610" y="335" width="160" height="86" class="state"/>
  <text x="690" y="369" text-anchor="middle" class="label">KV cache</text>
  <text x="690" y="396" text-anchor="middle" class="small">请求状态</text>

  <rect x="795" y="335" width="150" height="86" class="box4"/>
  <text x="870" y="369" text-anchor="middle" class="label">decode</text>
  <text x="870" y="396" text-anchor="middle" class="small">逐 token 循环</text>

  <path d="M 350 163 L 397 163" class="arrow"/>
  <path d="M 560 163 L 607 163" class="arrow"/>
  <path d="M 770 163 C 820 170 850 195 866 226" class="arrow"/>
  <path d="M 350 378 L 397 378" class="arrow"/>
  <path d="M 560 378 L 607 378" class="arrow"/>
  <path d="M 770 378 L 792 378" class="arrow"/>
  <path d="M 870 326 L 870 333" class="dash"/>
  <path d="M 870 230 C 710 255 560 288 480 332" class="dash"/>

  <text x="75" y="490" class="small">不要在 decode 热路径重新猜 shape 或重新 packing；计划可复用，KV cache 不能当普通临时张量复用。</text>
</svg>
