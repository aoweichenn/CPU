<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2A6F97"/>
    </marker>
    <style>
      text { font-family: "Noto Sans CJK SC", "Noto Sans", sans-serif; fill: #14213D; }
      .title { font-size: 30px; font-weight: 700; }
      .label { font-size: 22px; font-weight: 700; }
      .small { font-size: 18px; fill: #5B5F66; }
      .node { fill: #EEF6FA; stroke: #2A6F97; stroke-width: 2; rx: 14; }
      .node2 { fill: #EEF8F3; stroke: #2A7F62; stroke-width: 2; rx: 14; }
      .node3 { fill: #FFF7E6; stroke: #9A6A00; stroke-width: 2; rx: 14; }
      .bad { fill: #FFF1F1; stroke: #A33B3B; stroke-width: 2; rx: 14; }
      .arrow { stroke: #2A6F97; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #5B5F66; stroke-width: 2.4; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="0" y="0" width="1000" height="560" fill="#ffffff"/>
  <text x="50" y="55" class="title">LeetCode 679：24 点游戏的回溯状态</text>
  <text x="50" y="88" class="small">每一步从当前集合中选两个数合并，集合规模减少一；失败时回到选择前的集合继续试。</text>

  <rect x="70" y="130" width="210" height="92" class="node"/>
  <text x="175" y="166" text-anchor="middle" class="label">当前集合</text>
  <text x="175" y="198" text-anchor="middle" class="small">[4, 1, 8, 7]</text>

  <rect x="395" y="110" width="230" height="112" class="node2"/>
  <text x="510" y="147" text-anchor="middle" class="label">选择 8 和 4</text>
  <text x="510" y="178" text-anchor="middle" class="small">8 - 4 = 4</text>
  <text x="510" y="204" text-anchor="middle" class="small">新集合 [1, 7, 4]</text>

  <rect x="720" y="110" width="230" height="112" class="node2"/>
  <text x="835" y="147" text-anchor="middle" class="label">选择 7 和 1</text>
  <text x="835" y="178" text-anchor="middle" class="small">7 - 1 = 6</text>
  <text x="835" y="204" text-anchor="middle" class="small">新集合 [4, 6]</text>

  <rect x="720" y="300" width="230" height="105" class="node3"/>
  <text x="835" y="338" text-anchor="middle" class="label">最后合并</text>
  <text x="835" y="370" text-anchor="middle" class="small">4 * 6 = 24</text>
  <text x="835" y="396" text-anchor="middle" class="small">命中目标</text>

  <rect x="395" y="320" width="230" height="105" class="bad"/>
  <text x="510" y="356" text-anchor="middle" class="label">失败分支</text>
  <text x="510" y="386" text-anchor="middle" class="small">例如 4 + 1 = 5</text>
  <text x="510" y="412" text-anchor="middle" class="small">继续无法得到 24</text>

  <path d="M 280 176 L 392 166" class="arrow"/>
  <path d="M 625 166 L 717 166" class="arrow"/>
  <path d="M 835 222 L 835 296" class="arrow"/>
  <path d="M 280 191 C 330 255 350 310 392 355" class="dash"/>
  <path d="M 510 425 C 405 488 230 455 178 225" class="dash"/>

  <text x="228" y="488" class="small">回退的含义：恢复到“选两个数和运算符之前”的状态，而不是反向计算答案。</text>
</svg>
